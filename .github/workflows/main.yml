name: Apollo Music Online
on: [push]
jobs:
  run-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install Dependencies
        run: pip install fastapi uvicorn python-multipart
      - name: Run Backend
        run: uvicorn main:app --host 0.0.0.0 --port 8000 & sleep 21600
